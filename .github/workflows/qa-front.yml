name: CI - QA Frontend

on:
  push:
    branches: [qa-front]
  pull_request:
    branches: [qa-front]

jobs:
  lint-and-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Lint (ESLint)
        run: npm run lint

      - name: Tests unitarios (Jest)
        run: npm run test -- --ci --coverage

      - uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

  e2e-cypress:
    needs: lint-and-unit
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: unistream
          POSTGRES_PASSWORD: unistream_test
          POSTGRES_DB: unistream_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Instalar dependencias (frontend)
        run: npm ci

      - name: Instalar dependencias (backend)
        working-directory: backend
        run: npm ci

      - name: Liberar puertos (por si quedaron procesos previos)
        run: |
          fuser -k 3000/tcp || true
          fuser -k 3001/tcp || true

      - name: Ejecutar migraciones sobre BD de pruebas
        working-directory: backend
        run: npm run migrate
        env:
          DATABASE_URL: postgres://unistream:unistream_test@localhost:5433/unistream_test

      - name: Compilar y levantar backend
        working-directory: backend
        run: |
          npm run build
          npm run start:prod &
          echo $! > backend.pid
        env:
          DATABASE_URL: postgres://unistream:unistream_test@localhost:5433/unistream_test
          PORT: 3001

      - name: Esperar a que el backend responda
        run: npx wait-on http://localhost:3001/api/health --timeout 60000

      - name: Levantar app en modo build
        run: |
          npm run build
          cp -r public .next/standalone/public
          cp -r .next/static .next/standalone/.next/static
          PORT=3000 node .next/standalone/server.js &
          echo $! > app.pid

      - name: Esperar a que el servidor responda
        run: npx wait-on http://localhost:3000 --timeout 60000

      - name: Ejecutar pruebas E2E con Cypress
        run: npx cypress run

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-screenshots
          path: cypress/screenshots

      - name: Detener servidor
        if: always()
        run: kill "$(cat app.pid)" 2>/dev/null || true

      - name: Detener backend
        if: always()
        working-directory: backend
        run: kill "$(cat backend.pid)" 2>/dev/null || true
