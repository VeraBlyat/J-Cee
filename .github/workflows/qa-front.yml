name: CI - QA Frontend

on:
  push:
    branches: [qa-front]
  pull_request:
    branches: [qa-front]

jobs:
  lint-and-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Lint (ESLint)
        run: npm run lint

      - name: Tests unitarios (Jest)
        run: npm run test -- --ci --coverage

      - uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/