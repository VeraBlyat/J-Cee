name: CI - QA Backend

on:
  push:
    branches: [qa-back]
  pull_request:
    branches: [qa-back]

jobs:
  test-backend:
    runs-on: [self-hosted, laptop]
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: unistream
          POSTGRES_PASSWORD: unistream_test
          POSTGRES_DB: unistream_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Ejecutar migraciones sobre BD de pruebas
        run: npm run migrate
        env:
          DATABASE_URL: postgres://unistream:unistream_test@localhost:5433/unistream_test

      - name: Tests unitarios de rutas/API (Jest)
        run: npm run test:api -- --ci
        env:
          DATABASE_URL: postgres://unistream:unistream_test@localhost:5433/unistream_test

      - name: Compilar backend
        run: npm run build

      - name: Liberar puerto 3001 (por si quedó un proceso previo)
        run: fuser -k 3001/tcp || true

      - name: Levantar backend para pruebas de integración
        run: |
          npm run start:prod &
          echo $! > backend.pid
        env:
          DATABASE_URL: postgres://unistream:unistream_test@localhost:5433/unistream_test
          PORT: 3001

      - name: Esperar a que el backend responda
        run: npx wait-on http://localhost:3001/api/health --timeout 60000

      - name: Pruebas de integración (Postman/Newman)
        run: npx newman run tests/postman/unistream-collection.json --environment tests/postman/qa.postman_environment.json --timeout-request 15000

      - name: Detener backend
        if: always()
        run: kill "$(cat backend.pid)" 2>/dev/null || true
